{% extends 'base.html' %}
{% block content %}
<div class="contact-block checkout-form-container">
    <h1 class="cart-title">ВІДНОВЛЕННЯ ДОСТУПУ</h1>
    
    <div class="auth-wrapper">
        <p class="hero-subtitle text-center mb-30">
            Введіть пошту, яку ви хочете використовувати.
        </p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="auth-form-group">
                    <label class="auth-label-spaced">{{ field.label|upper }}:</label>
                    <div class="reg-field">
                        {{ field }}
                    </div>
                </div>
            {% endfor %}
            <button type="submit" class="btn-buy full-width mt-20">
                НАДІСЛАТИ ІНСТРУКЦІЇ
            </button>
        </form>
    </div>
</div>
{% endblock %}
